name: notes_app
description: "A cross-platform notes app with Anki-style syncing."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.0
  flutter_quill: ^10.0.0
  uuid: ^4.0.0
  http: ^1.2.0
  file_picker: ^8.0.0
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
